<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>橙子高考背诵助手 🍊</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">🍊 橙子高考背诵助手</div>
    <div class="countdown" id="countdown">距离高考 loading…</div>
  </header>

  <div class="toolbar">
    <div class="tabs" id="tabs"></div>
    <input id="search" class="search" type="search" placeholder="搜索知识点 / 关键词…" />
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>

  <main id="cards" class="cards"></main>

  <footer class="site-footer">
    <span>单击卡片查看详情 · 右键切换已背/未背</span>
    <span id="progress"></span>
  </footer>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle"></h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
